services:
  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: job-rec-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-job_recommendation}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ML Recommendation Service (Flask/Gunicorn)
  # ============================================
  ml-service:
    build:
      context: ./JobRecommendationServer-main/src/main/ml
      dockerfile: Dockerfile
    container_name: job-rec-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_DIR: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================
  # Spring Boot Backend API
  # ============================================
  backend:
    build:
      context: ./JobRecommendationServer-main
      dockerfile: Dockerfile
    container_name: job-rec-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-job_recommendation}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      ML_API_URL: http://ml-service:8000/predict
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ============================================
  # React Frontend (Nginx)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: job-rec-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
