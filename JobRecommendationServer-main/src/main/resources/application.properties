# ============================================
# Server Configuration
# ============================================
server.port=${SERVER_PORT:8080}

# ============================================
# Database Configuration (H2 for dev, MySQL for prod)
# ============================================
# Default: H2 in-memory database (works without any external DB)
spring.datasource.url=${DB_URL:jdbc:h2:file:./db/job_recommendation;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.sql.init.continue-on-error=true

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# H2 Console (dev only) — accessible at /h2-console
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# Initialize schema and seed data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================================
# ML Service Configuration
# ============================================
ml.api.url=${ML_API_URL:http://localhost:8000/predict}

# ============================================
# CORS Configuration
# ============================================
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# Google OAuth Configuration
# ============================================
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id-here}

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:job-reco-super-secret-key-change-in-production-minimum-32-characters-long}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ============================================
# Logging (production-safe defaults)
# ============================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.example.JobRecomendationserver=${APP_LOG_LEVEL:INFO}